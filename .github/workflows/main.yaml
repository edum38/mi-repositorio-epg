name: Actualizar EPG

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,12 * * *' # Ejecuta a las 00:00 y 12:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Dependencias
        run: pip install requests

      - name: Ejecutar Script
        run: python update_epg.py

      - name: Subir a GitHub
        run: |
          git config --global user.name "EPG-Bot"
          git config --global user.email "bot@github.com"
          git add guia_completa.xml
          git commit -m "Update $(date)" || echo "No hay cambios"
          git push


